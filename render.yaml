services:
  - type: web
    name: beer-house-palenque
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: DB_PATH
        value: /app/data/beer_house.db
      - key: UPLOAD_FOLDER
        value: /app/data/uploads
      - key: BACKUP_FOLDER
        value: /app/data/backups
      - key: FRONTEND_DIST
        value: /app/frontend/dist
      - key: SEED_DEMO_DATA
        value: "0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MAX_CONTENT_LENGTH
        value: "8388608"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: SELLER_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
